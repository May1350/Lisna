<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Option B: Notion-style Hierarchy</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif; }
  .modal { width: 400px; max-height: 760px; }
  .item { transition: background-color 120ms; }
  .item:hover { background-color: rgba(99,102,241,0.04); }
  .item:hover .ts { opacity: 1; }
  .ts { opacity: 0.4; transition: opacity 120ms; }
</style>
</head>
<body class="bg-slate-300 p-8 flex justify-center items-start min-h-screen">

<div class="modal bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col">
  <!-- Header -->
  <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 bg-white">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-xs font-bold">SH</div>
      <div class="text-xs leading-tight">
        <div class="font-medium text-gray-700">takgun.jr@gmail.com</div>
        <div class="text-gray-400">Free プラン</div>
      </div>
    </div>
    <div class="flex items-center gap-2 text-xs">
      <button class="bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded-md font-medium text-gray-600">2x</button>
      <button class="text-gray-400 hover:text-gray-600 p-1">✕</button>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto" id="content"></div>

  <div class="border-t border-gray-100 bg-gray-50/80 px-3 py-2">
    <div class="text-[10px] uppercase tracking-wider text-gray-400 font-medium mb-1">ライブ字幕</div>
    <div id="captions" class="max-h-24 overflow-y-auto text-xs text-gray-500 leading-relaxed space-y-0.5"></div>
  </div>

  <div class="border-t border-gray-100 px-3 py-2 flex items-center gap-2">
    <button class="flex-1 bg-rose-50 hover:bg-rose-100 text-rose-700 text-xs font-medium py-2 rounded-lg">■ 停止</button>
    <button class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-medium py-2 rounded-lg">⬇ PDF 保存</button>
  </div>
</div>

<script src="_data.js"></script>
<script>
const d = window.SH_DATA
const content = document.getElementById('content')

content.innerHTML = `
  <div class="px-4 pt-4 pb-2 sticky top-0 bg-white/95 backdrop-blur z-10 border-b border-gray-50">
    <div class="flex items-baseline justify-between gap-2">
      <h1 class="text-base font-bold text-gray-900 leading-tight flex items-center gap-2">
        <span class="text-lg">📚</span> ${d.title}
      </h1>
      <span class="text-[10px] text-emerald-600 font-medium shrink-0 whitespace-nowrap flex items-center gap-1">
        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
        ${d.refreshedSecondsAgo}秒前
      </span>
    </div>
  </div>

  <div class="px-3 py-2">
    ${d.sections.map((s, i) => `
      <div class="mb-3">
        <!-- Section heading: large, bold, no card -->
        <div class="item flex items-baseline gap-2 px-2 py-1 rounded">
          <span class="text-gray-400 text-xs">▸</span>
          <h3 class="text-sm font-bold text-gray-900 leading-snug flex-1">${s.heading}</h3>
          <button class="ts text-[10px] text-gray-400 hover:text-indigo-600 font-mono shrink-0">${fmtTs(s.ts)}</button>
        </div>

        <!-- Summary as quote block -->
        <div class="ml-4 pl-3 border-l-2 border-gray-100 py-1 my-1">
          <p class="text-xs text-gray-500 italic leading-relaxed">${s.summary}</p>
        </div>

        <!-- Items: each prefixed with icon, hover reveals ts -->
        <div class="ml-4 space-y-0.5">
          ${s.key_terms.map(kt => `
            <div class="item flex items-start gap-2 px-2 py-1 rounded">
              <span class="text-amber-500 mt-0.5 text-xs">📘</span>
              <div class="flex-1 min-w-0">
                <span class="text-xs font-semibold text-gray-900">${kt.term}</span>
                <span class="text-xs text-gray-600"> — ${kt.definition}</span>
              </div>
              <button class="ts text-[10px] text-gray-400 hover:text-indigo-600 font-mono shrink-0">${fmtTs(kt.ts)}</button>
            </div>
          `).join('')}

          ${s.points.filter(p => p.important).map(p => `
            <div class="item flex items-start gap-2 px-2 py-1 rounded bg-amber-50/40">
              <span class="text-amber-600 mt-0.5 text-xs">⭐</span>
              <p class="flex-1 text-xs text-gray-900 font-medium leading-snug">${p.text}</p>
              <button class="ts text-[10px] text-gray-400 hover:text-indigo-600 font-mono shrink-0">${fmtTs(p.ts)}</button>
            </div>
          `).join('')}

          ${s.points.filter(p => !p.important).map(p => `
            <div class="item flex items-start gap-2 px-2 py-1 rounded">
              <span class="text-gray-400 mt-0.5 text-xs">📌</span>
              <p class="flex-1 text-xs text-gray-700 leading-snug">${p.text}</p>
              <button class="ts text-[10px] text-gray-400 hover:text-indigo-600 font-mono shrink-0">${fmtTs(p.ts)}</button>
            </div>
          `).join('')}

          ${s.examples.map(e => `
            <div class="item flex items-start gap-2 px-2 py-1 rounded">
              <span class="text-emerald-500 mt-0.5 text-xs">💡</span>
              <p class="flex-1 text-xs text-gray-600 italic leading-snug">${e.text}</p>
              <button class="ts text-[10px] text-gray-400 hover:text-indigo-600 font-mono shrink-0">${fmtTs(e.ts)}</button>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
  </div>
`

const captions = document.getElementById('captions')
captions.innerHTML = d.liveTranscripts.map(t => `
  <p class="leading-relaxed">
    <span class="text-gray-300 mr-1 font-mono">[${fmtTs(t.ts)}]</span>${t.text}
  </p>
`).join('')
captions.scrollTop = captions.scrollHeight
</script>

<div class="ml-8 max-w-sm text-sm text-slate-700 self-center bg-white/90 backdrop-blur rounded-xl p-5 shadow-lg">
  <h2 class="font-bold text-base mb-2 text-slate-900">B. Notion-style Hierarchy</h2>
  <p class="text-xs leading-relaxed text-slate-600">아이콘 + 들여쓰기로 정보 종류를 즉시 구분. Notion / Obsidian 같은 노트 도구 패러다임.</p>
  <ul class="text-xs space-y-1.5 mt-3 text-slate-600">
    <li>📘 = 用語 정의</li>
    <li>⭐ = 중요 포인트</li>
    <li>📌 = 일반 포인트</li>
    <li>💡 = 구체적 예시</li>
    <li class="text-slate-500 mt-2">▸ 섹션 헤더 (collapsible 가능)</li>
    <li class="text-slate-500">호버 시 timestamp 표시 (visual noise ↓)</li>
  </ul>
  <p class="text-xs mt-3 text-slate-500"><strong>장점:</strong> 정보 유형 즉시 인식, 깨끗</p>
  <p class="text-xs mt-1 text-slate-500"><strong>단점:</strong> 색이 약해 ★ 시각 임팩트 ↓</p>
</div>

</body>
</html>
