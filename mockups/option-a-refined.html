<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Option A: Refined Compact</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif; }
  .modal { width: 400px; max-height: 760px; }
</style>
</head>
<body class="bg-slate-300 p-8 flex justify-center items-start min-h-screen">

<div class="modal bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col">
  <!-- Header -->
  <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 bg-white">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-xs font-bold">SH</div>
      <div class="text-xs leading-tight">
        <div class="font-medium text-gray-700">takgun.jr@gmail.com</div>
        <div class="text-gray-400">Free プラン</div>
      </div>
    </div>
    <div class="flex items-center gap-2 text-xs">
      <button class="bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded-md font-medium text-gray-600">2x</button>
      <button class="text-gray-400 hover:text-gray-600 p-1">✕</button>
    </div>
  </div>

  <!-- Content scroll -->
  <div class="flex-1 overflow-y-auto" id="content"></div>

  <!-- Live transcript -->
  <div class="border-t border-gray-100 bg-gray-50/80 px-3 py-2">
    <div class="text-[10px] uppercase tracking-wider text-gray-400 font-medium mb-1">ライブ字幕</div>
    <div id="captions" class="max-h-24 overflow-y-auto text-xs text-gray-500 leading-relaxed space-y-0.5"></div>
  </div>

  <!-- Footer actions -->
  <div class="border-t border-gray-100 px-3 py-2 flex items-center gap-2">
    <button class="flex-1 bg-rose-50 hover:bg-rose-100 text-rose-700 text-xs font-medium py-2 rounded-lg">■ 停止</button>
    <button class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-medium py-2 rounded-lg">⬇ PDF 保存</button>
  </div>
</div>

<script src="_data.js"></script>
<script>
const d = window.SH_DATA
const content = document.getElementById('content')

content.innerHTML = `
  <!-- Title bar -->
  <div class="px-4 pt-4 pb-3 sticky top-0 bg-white/95 backdrop-blur z-10 border-b border-gray-50">
    <div class="flex items-baseline justify-between gap-2">
      <h1 class="text-base font-bold text-gray-900 leading-tight">${d.title}</h1>
      <span class="text-[10px] text-emerald-600 font-medium shrink-0 whitespace-nowrap">
        ✎ ${d.refreshedSecondsAgo}秒前
      </span>
    </div>
  </div>

  <!-- Sections -->
  <div class="px-3 py-2 space-y-3">
    ${d.sections.map((s, i) => `
      <section class="rounded-lg border border-gray-100 overflow-hidden">
        <!-- Section header: subtle indigo accent -->
        <div class="flex items-baseline justify-between gap-2 px-3 py-2 bg-indigo-50/40 border-l-[3px] border-indigo-400">
          <h3 class="text-sm font-semibold text-gray-900 leading-snug">${s.heading}</h3>
          <button class="text-[10px] text-indigo-600 hover:text-indigo-800 font-mono shrink-0">${fmtTs(s.ts)}</button>
        </div>

        <!-- Summary -->
        <p class="px-3 pt-2 text-xs text-gray-600 italic leading-relaxed">${s.summary}</p>

        <!-- Key terms: amber definition cards -->
        ${s.key_terms.length ? `
          <div class="px-3 pt-2 space-y-1.5">
            ${s.key_terms.map(kt => `
              <div class="bg-amber-50 border border-amber-100 rounded-md px-2.5 py-1.5">
                <div class="flex items-baseline justify-between">
                  <span class="text-xs font-semibold text-amber-900">${kt.term}</span>
                  <span class="text-[10px] text-amber-400 font-mono">${fmtTs(kt.ts)}</span>
                </div>
                <p class="text-xs text-gray-700 mt-0.5 leading-relaxed">${kt.definition}</p>
              </div>
            `).join('')}
          </div>
        ` : ''}

        <!-- Important points: rose left border, prominent -->
        ${s.points.filter(p => p.important).length ? `
          <div class="px-3 pt-2 space-y-1">
            ${s.points.filter(p => p.important).map(p => `
              <div class="bg-rose-50/60 border-l-2 border-rose-400 pl-2 pr-2 py-1.5 rounded-r">
                <div class="flex items-baseline justify-between gap-2">
                  <p class="text-xs text-gray-900 font-medium leading-snug">★ ${p.text}</p>
                  <span class="text-[10px] text-rose-300 font-mono shrink-0">${fmtTs(p.ts)}</span>
                </div>
              </div>
            `).join('')}
          </div>
        ` : ''}

        <!-- Regular points -->
        ${s.points.filter(p => !p.important).length ? `
          <ul class="px-3 pt-1 space-y-0.5">
            ${s.points.filter(p => !p.important).map(p => `
              <li class="flex gap-1.5 text-xs text-gray-700 leading-relaxed">
                <span class="text-gray-300 shrink-0">·</span>
                <span class="flex-1">${p.text}</span>
                <span class="text-[10px] text-gray-300 font-mono shrink-0">${fmtTs(p.ts)}</span>
              </li>
            `).join('')}
          </ul>
        ` : ''}

        <!-- Examples: muted, inline-quote style -->
        ${s.examples.length ? `
          <div class="px-3 pt-2 pb-2 space-y-0.5">
            <div class="text-[10px] uppercase tracking-wider text-gray-400 font-medium">例</div>
            ${s.examples.map(e => `
              <div class="flex gap-1.5 text-xs text-gray-500 leading-relaxed">
                <span class="text-gray-300 shrink-0">→</span>
                <span class="flex-1 italic">${e.text}</span>
                <span class="text-[10px] text-gray-300 font-mono shrink-0">${fmtTs(e.ts)}</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </section>
    `).join('')}
  </div>
`

// Live transcript
const captions = document.getElementById('captions')
captions.innerHTML = d.liveTranscripts.map(t => `
  <p class="leading-relaxed">
    <span class="text-gray-300 mr-1 font-mono">[${fmtTs(t.ts)}]</span>${t.text}
  </p>
`).join('')
captions.scrollTop = captions.scrollHeight
</script>

<div class="ml-8 max-w-sm text-sm text-slate-700 self-center bg-white/90 backdrop-blur rounded-xl p-5 shadow-lg">
  <h2 class="font-bold text-base mb-2 text-slate-900">A. Refined Compact</h2>
  <p class="text-xs leading-relaxed text-slate-600">현재 디자인의 정제판. 색상 시스템을 다듬어 정보의 종류가 한눈에 구분되도록.</p>
  <ul class="text-xs space-y-1.5 mt-3 text-slate-600">
    <li><span class="text-indigo-600">🔵</span> 섹션 헤더 = indigo</li>
    <li><span class="text-amber-700">🟡</span> 用語 정의 = amber 카드</li>
    <li><span class="text-rose-600">🔴</span> ★ 중요 = rose 강조 박스</li>
    <li><span class="text-gray-500">⚫</span> 例 = 회색 italic 인용</li>
  </ul>
  <p class="text-xs mt-3 text-slate-500"><strong>장점:</strong> 변화 최소, 학습 친화 색상</p>
  <p class="text-xs mt-1 text-slate-500"><strong>단점:</strong> 상대적으로 보수적, 차별화 약함</p>
</div>

</body>
</html>
