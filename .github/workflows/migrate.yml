name: Run DB Migrations

# Manually triggers the MigrateFn Lambda (created by infra/lib/migrate-stack.ts).
# Deploy-backend creates / updates the Lambda; this workflow invokes it.
# A `reason` is required for audit purposes — shows up in the run summary
# and in CloudWatch invocation logs.
# Requires `AWS_DEPLOY_ROLE_ARN` repo secret. See operations.md.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this? (audit trail — required)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  # If multiple Lambda stacks coexist (rare), we can filter by name prefix.
  # Default matches the CDK construct name in api-stack.ts.
  MIGRATE_FN_NAME_PREFIX: 'MigrateFn'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify OIDC secret is configured
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "::error::AWS_DEPLOY_ROLE_ARN secret not configured. See operations.md."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve MigrateFn Lambda name
        id: find
        # The CDK-generated name is something like `StudyHelperMigrate-MigrateFnXXXX-YYYY`.
        # `list-functions` + JMESPath filter > hard-coding the name.
        run: |
          NAME=$(aws lambda list-functions \
            --query "Functions[?contains(FunctionName, '${MIGRATE_FN_NAME_PREFIX}')].FunctionName | [0]" \
            --output text)
          if [ -z "$NAME" ] || [ "$NAME" = "None" ]; then
            echo "::error::No Lambda matching prefix '${MIGRATE_FN_NAME_PREFIX}' found."
            echo "::error::Did the backend stack deploy successfully?"
            exit 1
          fi
          echo "Found: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Invoke MigrateFn
        # --log-type Tail returns the last 4 KB of CloudWatch logs base64-encoded.
        # We surface those so a failure is debuggable without leaving the run.
        run: |
          aws lambda invoke \
            --function-name "${{ steps.find.outputs.name }}" \
            --log-type Tail \
            --query 'LogResult' \
            --output text \
            /tmp/migrate-out.json | base64 -d
          echo ""
          echo "=== Function response ==="
          cat /tmp/migrate-out.json
          echo ""

      - name: Log audit reason
        run: |
          echo "Migration triggered by ${{ github.actor }}"
          echo "Reason: ${{ inputs.reason }}"
          echo "Commit: ${{ github.sha }}"
