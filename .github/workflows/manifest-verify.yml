name: Manifest verify

# Runs on PRs that touch the model manifest. Streams each model file from
# R2 and verifies Content-Length + SHA256 match the manifest entries.
# Caches results by ETag so unchanged entries don't re-download.
#
# If all manifest entries are still PENDING_UPLOAD (A13 not yet complete)
# the script exits 0 with a warning — no false-failure.
#
# Required repository secrets (add under Settings → Secrets → Actions):
#   R2_ACCESS_KEY_ID      — Cloudflare R2 access key
#   R2_SECRET_ACCESS_KEY  — Cloudflare R2 secret key
#   R2_ENDPOINT_URL       — https://<acct>.r2.cloudflarestorage.com
#   R2_BUCKET             — R2 bucket name (e.g. lisna-models)

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/manifests/**'

# Cancel any in-flight run for the same PR branch when a new commit lands.
concurrency:
  group: manifest-verify-${{ github.ref }}
  cancel-in-progress: true

# Workflow only reads the repo + downloads from R2; no GitHub write-back.
permissions:
  contents: read

# Opt JavaScript actions into the Node 24 runtime ahead of GH's
# 2026-06-02 Node 20 deprecation. See ci.yml for the rationale.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # streaming large model files can take a while

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Cache manifest verification results
        uses: actions/cache@v4
        with:
          path: backend/.ci-manifest-cache
          # Invalidate whenever the manifest changes — new SHAs or sizes
          # mean we must re-stream even if the ETag says the file is the
          # same object. The ETag inner cache then handles per-file skips.
          key: manifest-cache-${{ hashFiles('backend/manifests/model-manifest.v1.json') }}
          restore-keys: |
            manifest-cache-

      - name: Verify manifest against R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: pnpm verify:manifest
