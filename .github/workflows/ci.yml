name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid stacking parallel CI runs when commits land back-to-back.
# In-progress runs for an outdated commit are cancelled so the
# latest commit's verdict is what we wait on.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt JavaScript actions into the Node 24 runtime ahead of GH's
# 2026-06-02 Node 20 deprecation (forced default from that date,
# Node 20 removed from runner 2026-09-16). The actions used here
# (checkout, setup-node, pnpm/action-setup, cache) still ship Node 20
# bundles — this env var flips them to Node 24 without waiting for
# upstream major-version bumps.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Version intentionally omitted — pnpm/action-setup reads
        # `packageManager` from package.json (pnpm@9.0.0), keeping the
        # version in one source of truth. Specifying both ways conflicts
        # with ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        # Frozen-lockfile is the load-bearing safety: this is what catches
        # a stale or hand-edited pnpm-lock.yaml before it lands on main.
        # Local `pnpm install` regenerates the lockfile silently — only
        # this CI step trips on the drift.
        run: pnpm install --frozen-lockfile

      # ── Shared (must build first — backend/extension consume its dist) ─
      - name: Shared — build (zod schemas)
        run: pnpm --filter shared build

      # ── Backend ───────────────────────────────────────────────────────
      - name: Backend — typecheck (tsc)
        run: pnpm --filter backend build

      - name: Backend — tests (104 vitest)
        run: pnpm --filter backend test

      # ── Extension ─────────────────────────────────────────────────────
      - name: Extension — typecheck
        run: pnpm --filter extension typecheck

      - name: Extension — tests
        run: pnpm --filter extension test

      - name: Extension — build (dev mode, no CWS_BUILD)
        # CWS_BUILD=1 omits the `key` field for store submission;
        # we leave it default in CI so the build path that dev users
        # actually load is what gets verified. Also: no .env.production
        # in CI (gitignored) → shared/config.ts falls back to localhost
        # URLs, which is fine for build verification (no deploy).
        run: pnpm --filter extension build

      - name: Cache Playwright browsers
        # Chromium download is ~120 MB; cache by Playwright version
        # (encoded in @playwright/test inside pnpm-lock) so we only
        # re-download on Playwright bumps.
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter extension exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        # System libs (libnss3 etc.) aren't cached even when the
        # browser binary is — install them unconditionally.
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter extension exec playwright install-deps chromium

      - name: Extension — E2E (Playwright)
        # Loads the freshly-built dist/ as an unpacked extension in a
        # new-headless Chromium context, navigates to side-panel HTML,
        # and asserts the brand logo image's naturalWidth > 0 — the
        # check that would have caught the Phase 1C icon-path regression.
        run: pnpm --filter extension test:e2e

      # ── Web ───────────────────────────────────────────────────────────
      - name: Web — i18n parity (en/ja/ko)
        # Hard-fails on key drift across messages/{en,ja,ko}.json; strict
        # mode also fails on value-parity warnings (key whose value is the
        # same as en, but isn't in the allowlist) and on hardcoded CJK in
        # JSX. The allowlists live in web/src/i18n/brand-vocabulary.ts +
        # web/scripts/check-i18n.mjs (kept in sync by the script itself).
        run: node web/scripts/check-i18n.mjs --strict

      - name: Web — build (Next.js)
        # `next build` covers TypeScript checks + static-page generation.
        # env.ts evaluates at module load during static page collection
        # (`/_not-found` etc.), so NEXTAUTH_* + DATABASE_URL must be
        # present for the Zod schema to parse. Values mirror Vercel
        # Production envs; no real DB connection happens during build.
        #
        # Fallbacks let Dependabot PRs build — Dependabot has a separate
        # secrets scope (Settings → Secrets → Dependabot) and won't see
        # the Actions-scope secrets.* unless duplicated. Real Vercel
        # deploys use prod env vars, never these dummies.
        env:
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'https://example.com' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-build-only-not-for-runtime-use!' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:dummy@localhost:5432/dummy' }}
        run: pnpm --filter lisna-web build

  # ── Desktop ─────────────────────────────────────────────────────────────
  # Runs on macOS so Electron's native modules (CoreAudio Tap, etc.) resolve
  # correctly. Kept as a separate job so it doesn't block the Linux steps.
  desktop-ci:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Desktop — CI gate + typecheck + lint + test
        run: pnpm --filter @lisna/desktop verify
